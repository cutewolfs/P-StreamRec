version: "2026.17.1"
port: 8080
description: >-
  P-StreamRec is a self-hosted recorder for Chaturbate, CAM4 and any m3u8/HLS live stream, with a modern web interface.


  Supported sites:

  - Chaturbate — watch, record, follow

  - CAM4 — watch, record, follow

  - Any m3u8 / HLS URL — watch, record

  - Coming soon: Stripchat, BongaCams, MyFreeCams


  Features:

  - 24/7 automatic recording — monitors models and records when they go live

  - Auto MP4 conversion — converts TS to compressed MP4 in background (50-70% smaller)

  - Discover — browse live models from every supported site with gender, tag, and search filters

  - Following — one aggregated list across Chaturbate and CAM4 accounts

  - Recordings — manage all recordings with a built-in video player

  - Live Watch — watch streams directly in the browser with HLS.js

  - FlareSolverr bundled — automatic Cloudflare bypass

  - Password protection and optional Chaturbate / CAM4 login for better stream quality


  Built with FastAPI, SQLite, HLS.js and FFmpeg. All data stays on your Umbrel.
