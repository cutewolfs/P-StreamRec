category: media
version: "2026.16.9"
port: 8080
description: >-
  P-StreamRec is a self-hosted recorder for Chaturbate and any m3u8/HLS live stream, with a modern web interface.


  Features:

  - 24/7 automatic recording — monitors models and records when they go live

  - Auto MP4 conversion — converts TS to compressed MP4 in background (50-70% smaller)

  - Discover — browse live Chaturbate models with gender, tag, and search filters

  - Following — sync and view your followed models from your Chaturbate account

  - Recordings — manage all recordings with a built-in video player

  - Live Watch — watch streams directly in the browser with HLS.js

  - FlareSolverr bundled — automatic Cloudflare bypass

  - Password protection and optional Chaturbate login for better stream quality


  Built with FastAPI, SQLite, HLS.js and FFmpeg. All data stays on your Umbrel.
