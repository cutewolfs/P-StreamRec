name: P-StreamRec
tagline: Watch, record & follow public live cam streams
icon: https://raw.githubusercontent.com/raccommode/P-StreamRec/main/p-streamrec-store-p-streamrec/icon.svg
category: media
version: "2026.22.2"
port: 8080
description: >-
  P-StreamRec is a self-hosted recorder for supported public live cam providers and any m3u8/HLS live stream, with a modern web interface.


  Supported sites:

  - Chaturbate — watch, record, follow

  - CAM4 — watch, record, follow

  - Stripchat, BongaCams, CamSoda — discover, watch and record via yt-dlp, with browser fallback

  - MyFreeCams, LiveJasmin, Streamate, Flirt4Free, Cams.com, Xcams — discover, watch and record via integrated browser capture

  - Any m3u8 / HLS URL — watch, record


  Features:

  - 24/7 automatic recording — monitors models and records when they go live

  - Auto MP4 conversion — converts TS to compressed MP4 in background (50-70% smaller)

  - Discover — browse live models from every supported site with gender, tag, and search filters

  - Following — one aggregated list across providers

  - Recordings — manage all recordings with a built-in video player

  - Live Watch — watch streams directly in the browser with HLS.js

  - Playwright browser runtime bundled for protected providers

  - Password protection and optional provider login for better stream access


  Built with FastAPI, SQLite, HLS.js and FFmpeg. All data stays on your Umbrel.
