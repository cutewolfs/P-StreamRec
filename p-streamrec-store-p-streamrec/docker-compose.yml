version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: p-streamrec-store-p-streamrec_web_1
      APP_PORT: 8080

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: on-failure
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}

  web:
    image: ghcr.io/raccommode/p-streamrec:latest
    restart: on-failure
    stop_grace_period: 1m
    # Startup race against FlareSolverr is handled by the Python-side retry
    # loop in app/main.py — the docker healthcheck approach was blocking
    # Umbrel updates on slower hardware where FlareSolverr can take 90s+ to
    # boot Chromium. Keep the dependency ordering but don't gate on health.
    depends_on:
      - flaresolverr
    environment:
      - OUTPUT_DIR=/data
      - PORT=8080
      - FFMPEG_PATH=ffmpeg
      - HLS_TIME=4
      - HLS_LIST_SIZE=6
      - CB_RESOLVER_ENABLED=true
      - PSTREAMREC_DNS_CACHE=${PSTREAMREC_DNS_CACHE:-false}
      - AUTO_RECORD_USERS=
      # Optional: set PASSWORD here if you want an extra layer on top of Umbrel auth
      - PASSWORD=
      - TZ=${TZ:-UTC}
      # Optional Chaturbate login (enables Following page + better stream quality)
      - CHATURBATE_USERNAME=
      - CHATURBATE_PASSWORD=
      # Optional outbound proxy for provider requests
      - PSTREAMREC_PROXY_URL=${PSTREAMREC_PROXY_URL:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,flaresolverr}
      # FlareSolverr runs as a sibling container inside this app.
      # Docker Compose exposes each service under its name as a DNS alias on
      # the project's internal network, so `flaresolverr` resolves regardless
      # of Umbrel's container naming scheme (_1 vs -1).
      - FLARESOLVERR_URL=http://flaresolverr:8191
    volumes:
      - ${APP_DATA_DIR}/data:/data
