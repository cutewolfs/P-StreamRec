version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: p-streamrec-store-p-streamrec_web_1
      APP_PORT: 8080

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: on-failure
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-UTC}

  web:
    image: ghcr.io/raccommode/p-streamrec:latest
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - flaresolverr
    environment:
      - OUTPUT_DIR=/data
      - PORT=8080
      - FFMPEG_PATH=ffmpeg
      - HLS_TIME=4
      - HLS_LIST_SIZE=6
      - CB_RESOLVER_ENABLED=true
      - AUTO_RECORD_USERS=
      # Optional: set PASSWORD here if you want an extra layer on top of Umbrel auth
      - PASSWORD=
      - TZ=${TZ:-UTC}
      # Optional Chaturbate login (enables Following page + better stream quality)
      - CHATURBATE_USERNAME=
      - CHATURBATE_PASSWORD=
      # FlareSolverr runs as a sibling container inside this app.
      # Docker Compose exposes each service under its name as a DNS alias on
      # the project's internal network, so `flaresolverr` resolves regardless
      # of Umbrel's container naming scheme (_1 vs -1).
      - FLARESOLVERR_URL=http://flaresolverr:8191
    volumes:
      - ${APP_DATA_DIR}/data:/data
