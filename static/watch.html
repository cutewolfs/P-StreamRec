<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Watch - P-StreamRec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/static/loader.js"></script>
  <script defer src="/static/watch.js?v=14"></script>
</head>
<body>
  <div id="header-placeholder"></div>

  <!-- Video Player (Theater Mode) -->
  <div class="watch-player-container">
    <button class="watch-back-btn" id="watchBackBtn" type="button" onclick="goBackFromWatch()" title="Back" aria-label="Back">
      <span aria-hidden="true">&#8592;</span>
    </button>
    <video id="videoPlayer" class="watch-video" autoplay muted playsinline></video>
    <div class="watch-live-controls" id="liveControls">
      <button class="watch-control-btn" id="livePlayBtn" type="button" title="Play/Pause" aria-label="Play/Pause">
        <span id="livePlayIcon">&#10074;&#10074;</span>
      </button>
      <button class="watch-control-btn" id="liveMuteBtn" type="button" title="Mute" aria-label="Mute">
        <span id="liveMuteIcon">&#128266;</span>
      </button>
      <input class="watch-volume-slider" id="liveVolumeSlider" type="range" min="0" max="1" step="0.01" aria-label="Volume">
      <div class="watch-live-state" aria-label="Live status">
        <span class="watch-live-dot"></span>
        <span>Online</span>
      </div>
      <select class="watch-quality-select" id="watchQualitySelect" aria-label="Quality" disabled>
        <option value="-1">Auto</option>
      </select>
      <button class="watch-control-btn" id="liveFullscreenBtn" type="button" title="Fullscreen" aria-label="Fullscreen">
        <span>&#9974;</span>
      </button>
    </div>
    <div class="watch-offline-overlay" id="offlineOverlay" style="display: none;">
      <div class="offline-message">
        <div class="icon" id="offlineIcon">&#128308;</div>
        <h2 id="offlineTitle">Model is Offline</h2>
        <p id="offlineText">This model is currently not streaming.</p>
        <button class="watch-btn retry-btn" id="retryBtn" onclick="retryStream()" style="margin-top: 1rem;">Retry</button>
      </div>
    </div>
  </div>

  <!-- Model Info -->
  <div class="watch-info">
    <div class="watch-info-left">
      <h1 class="watch-username" id="watchUsername">Loading...</h1>
      <div class="watch-status" id="watchStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking...</span>
        <span id="platformBadgeContainer" style="display: none;"></span>
        <span class="watch-viewers" id="viewerCount" style="display: none;">
          &#128065; <span id="viewerNum">0</span>
        </span>
      </div>
      <div class="watch-tags" id="watchTags" style="display: none;"></div>
    </div>
    <div class="watch-info-right">
      <button class="watch-btn follow-btn" id="followBtn" onclick="toggleFollow()" style="display: none;">
        <span id="followIcon">&#9829;</span>
        <span id="followText">Follow</span>
      </button>
      <button class="watch-btn record-btn" id="recordBtn" onclick="toggleAutoRecord()" style="display: none;">
        <span id="recordIcon">&#9679;</span>
        <span id="recordText">Auto-Record</span>
      </button>
    </div>
  </div>

</body>
</html>
