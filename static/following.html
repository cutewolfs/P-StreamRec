<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Following - P-StreamRec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/loader.js"></script>
  <script defer src="/static/following.js?v=10"></script>
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="container">
    <div id="providerSections" class="following-provider-list" style="display: none;"></div>

    <!-- Empty state -->
    <div class="empty-message" id="emptyFollowing" style="display: none;">
      <div class="icon">&#128100;</div>
      <p>No follows saved yet. Connect Chaturbate or CAM4 to sync, or use local follows on other providers.</p>
    </div>

    <!-- Loading state -->
    <div class="empty-message" id="loadingState">
      <div class="icon">&#9203;</div>
      <p>Loading...</p>
    </div>
  </div>

  <div id="footer-placeholder"></div>
</body>
</html>
