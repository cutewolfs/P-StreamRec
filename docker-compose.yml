version: "3.8"

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/Toronto}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    restart: unless-stopped

  p-streamrec:
    image: ghcr.io/raccommode/p-streamrec:latest
    container_name: p-streamrec
    # Startup race against FlareSolverr is handled by the Python-side retry
    # loop in app/main.py — the docker healthcheck approach was blocking
    # Umbrel updates on slower hardware where FlareSolverr can take 90s+ to
    # boot Chromium. Keep the dependency ordering but don't gate on health.
    depends_on:
      - flaresolverr
    environment:
      - OUTPUT_DIR=/data
      - PORT=${PORT:-8080}
      - FFMPEG_PATH=ffmpeg
      - HLS_TIME=${HLS_TIME:-4}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-6}
      - RECORDING_RANGE_CHUNK_SIZE=${RECORDING_RANGE_CHUNK_SIZE:-8388608}
      - CB_RESOLVER_ENABLED=${CB_RESOLVER_ENABLED:-true}
      - PSTREAMREC_DNS_CACHE=${PSTREAMREC_DNS_CACHE:-false}
      - AUTO_RECORD_USERS=${AUTO_RECORD_USERS:-}
      # - CB_COOKIE=session=...; autre=...   # Optionnel
      - PASSWORD=${PASSWORD:-}
      - TZ=${TZ:-America/Toronto}
      # Chaturbate Authentication
      - CHATURBATE_USERNAME=${CHATURBATE_USERNAME:-}
      - CHATURBATE_PASSWORD=${CHATURBATE_PASSWORD:-}
      # FlareSolverr
      - FLARESOLVERR_URL=${FLARESOLVERR_URL:-http://flaresolverr:8191}
      # Optional outbound proxy for provider requests (HTTP(S) or SOCKS for Python resolvers)
      - PSTREAMREC_PROXY_URL=${PSTREAMREC_PROXY_URL:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,flaresolverr}
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    volumes:
      - ${HOST_DATA_DIR:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
